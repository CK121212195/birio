<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏃‍♂️ BITCOIN RUN ⚡️</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #F7931A; --bg: #1A1A2E; --ground: #16213E; --text: #E94560;
    }
    body {
      margin: 0; padding: 0; background-color: var(--bg); color: white;
      font-family: 'Noto Sans JP', sans-serif; display: flex; flex-direction: column;
      align-items: center; min-height: 100vh; overflow: hidden; touch-action: none;
    }
    
    .lang-selector { position: absolute; top: 15px; right: 15px; z-index: 100; }
    select.lang-select { background: #0f3460; color: #fff; border: 1px solid var(--primary); padding: 5px 10px; border-radius: 5px; font-family: 'Press Start 2P', cursive; font-size: 8px; cursor: pointer; }

    /* --- メインコンテナ --- */
    #app-container {
      width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative;
    }

    /* --- UIパネル (Paywall, Invoice, Result) --- */
    .panel {
      background: rgba(22, 33, 62, 0.9); border: 2px solid var(--primary); border-radius: 12px;
      padding: 30px 20px; text-align: center; box-shadow: 0 0 20px rgba(247, 147, 26, 0.3);
      width: 90%; max-width: 400px; position: absolute; z-index: 10;
    }

    .title { font-family: 'Press Start 2P', cursive; font-size: 1.5rem; color: var(--primary); margin-bottom: 15px; line-height: 1.4; text-shadow: 2px 2px 0px #000; }
    .desc { font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6; color: #ddd; }
    
    .btn {
      background: var(--primary); color: #000; border: none; padding: 15px 20px; width: 100%;
      border-radius: 8px; cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 10px;
      box-shadow: 0 4px 0 #C47F00; transition: 0.1s; margin-bottom: 10px;
    }
    .btn:active { transform: translateY(4px); box-shadow: none; }
    .btn-secondary { background: #0f3460; color: #fff; box-shadow: 0 4px 0 #0a2442; }
    /* テスト用無料ボタン */
    .btn-free { background: #00FF88; color: #000; box-shadow: 0 4px 0 #009955; }

    /* --- ゲームキャンバス --- */
    canvas {
      display: none; background: #111; border: 2px solid var(--primary);
      border-radius: 8px; box-shadow: 0 0 15px rgba(247, 147, 26, 0.2); width: 95%; max-width: 600px;
    }
    .score-display { position: absolute; top: 20px; left: 20px; font-family: 'Press Start 2P', cursive; font-size: 12px; color: var(--primary); display: none; z-index: 5;}
  </style>
</head>
<body>

  <div class="lang-selector">
    <select class="lang-select" onchange="changeLang(this.value)">
      <option value="ja">🇯🇵 JP</option>
      <option value="en">🇺🇸 EN</option>
      <option value="ko">🇰🇷 KO</option>
    </select>
  </div>

  <div class="score-display" id="score-display">SCORE: 0</div>

  <div id="app-container">
    
    <!-- 1. トップ画面 -->
    <div class="panel" id="panel-start">
      <div class="title">BITCOIN<br>RUN 🏃‍♂️</div>
      <div class="desc" data-i18n="desc">Fiat(法定通貨)を飛び越えろ！<br>ハイスコアを目指せ！</div>
      
      <!-- テスト用に決済をスキップして直接ゲームを開始するボタン -->
      <button class="btn btn-free" onclick="startGame()"><span data-i18n="btn_play_free">PLAY FREE (TEST)</span></button>
      
      <!-- 本番用のボタンは一旦コメントアウト（または非表示）にしておきます -->
      <!-- <button class="btn" onclick="generateInvoice()"><span data-i18n="btn_play">PLAY (10 SATS)</span></button> -->
    </div>

    <!-- 3. ゲーム画面 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 4. 結果画面 -->
    <div class="panel" id="panel-result" style="display:none;">
      <div class="title" style="color:var(--text);" data-i18n="gameover">GAME OVER</div>
      <div class="title" style="font-size:1.8rem; margin: 20px 0;" id="final-score">0</div>
      <button class="btn btn-secondary" onclick="shareTwitter()"><span data-i18n="btn_share">🐦 SHARE TO X</span></button>
      
      <!-- テスト用に無料リトライボタン -->
      <button class="btn btn-free" onclick="startGame()"><span data-i18n="btn_retry_free">RETRY FREE</span></button>
    </div>

  </div>

<script>
// 多言語辞書
const i18n = {
  en: {
    desc: "Jump over the melting Fiat!<br>Aim for the high score!",
    btn_play_free: "PLAY FREE", gameover: "GAME OVER", 
    btn_share: "🐦 SHARE TO X", btn_retry_free: "RETRY FREE"
  },
  ja: {
    desc: "Fiat（法定通貨）を飛び越えろ！<br>ハイスコアを目指せ！",
    btn_play_free: "無料でプレイ", gameover: "ゲームオーバー", 
    btn_share: "🐦 𝕏でシェア", btn_retry_free: "もう一度プレイ"
  },
  ko: {
    desc: "법정화폐(Fiat)를 뛰어넘으세요!<br>최고 점수에 도전하세요!",
    btn_play_free: "무료로 플레이", gameover: "게임 오버", 
    btn_share: "🐦 𝕏에 공유하기", btn_retry_free: "다시 플레이"
  }
};

let currentLang = "ja";
function changeLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = i18n[lang][el.getAttribute('data-i18n')];
  });
}

function shareTwitter() {
  const text = `I scored ${Math.floor(score)} points in BITCOIN RUN! 🏃‍♂️⚡️\nJump over the Fiat and stack Sats!\n#Bitcoin #LightningNetwork`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}

// ----------------------------------------------------
// ゲームエンジン (Canvas 2D)
// ----------------------------------------------------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreUI = document.getElementById('score-display');

function resizeCanvas() {
  canvas.width = Math.min(window.innerWidth * 0.95, 600);
  canvas.height = 300;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let player, obstacles, items, gameSpeed, score, frame, isGameOver, reqId;

function startGame() {
  // パネルを非表示にしてCanvasを表示
  document.getElementById('panel-start').style.display = 'none';
  document.getElementById('panel-result').style.display = 'none';
  canvas.style.display = 'block';
  scoreUI.style.display = 'block';
  
  // ゲームの初期化
  player = { x: 50, y: 100, r: 16, vy: 0, gravity: 0.6, jump: -10 };
  obstacles = [];
  items =[];
  gameSpeed = 5;
  score = 0;
  frame = 0;
  isGameOver = false;

  if(reqId) cancelAnimationFrame(reqId);
  updateGame();
}

// ジャンプ操作（画面タップ / クリック / スペースキー）
function jump() {
  if (isGameOver) return;
  const groundY = canvas.height - 25;
  // 地面にいる時だけジャンプ可能（rは半径。少しの誤差を許容）
  if (player.y + player.r >= groundY - 1) {
    player.vy = player.jump;
  }
}
window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
canvas.addEventListener('mousedown', jump);

function updateGame() {
  if (isGameOver) return;

  // 1. プレイヤーの物理演算
  player.vy += player.gravity;
  player.y += player.vy;
  const groundY = canvas.height - 25;
  if (player.y + player.r >= groundY) {
    player.y = groundY - player.r;
    player.vy = 0;
  }

  // 2. 障害物(Fiat)とアイテム(Sats)の生成
  frame++;
  // スピードが上がるにつれて生成間隔を短くする
  let spawnRate = Math.max(50, 100 - Math.floor(gameSpeed * 5));
  
  if (frame % spawnRate === 0) {
    // 障害物 (大きさランダム)
    let w = 25 + Math.random() * 15;
    let h = 30 + Math.random() * 25;
    obstacles.push({ x: canvas.width, y: groundY - h, w: w, h: h });
  }

  if (frame % 120 === 0 && Math.random() > 0.4) {
    // アイテム（ジャンプで取れる高さ）
    items.push({ x: canvas.width, y: groundY - 80 - Math.random() * 60, r: 12 });
  }

  // 3. 当たり判定と移動
  for (let i = 0; i < obstacles.length; i++) {
    let obs = obstacles[i];
    obs.x -= gameSpeed;
    if (circleRectCollide(player, obs)) {
      gameOver();
      return;
    }
  }

  for (let i = 0; i < items.length; i++) {
    let item = items[i];
    item.x -= gameSpeed;
    let dx = player.x - item.x;
    let dy = player.y - item.y;
    if (Math.sqrt(dx*dx + dy*dy) < player.r + item.r) {
      score += 50; // ボーナススコア
      items.splice(i, 1);
      i--;
    }
  }

  // 画面外の要素を削除
  obstacles = obstacles.filter(o => o.x + o.w > 0);
  items = items.filter(i => i.x + i.r > 0);

  // スコア加算と難易度上昇
  score += 0.1;
  if (Math.floor(score) % 100 === 0) gameSpeed += 0.2; // 徐々にスピードアップ

  scoreUI.innerText = `SCORE: ${Math.floor(score)}`;
  drawGame();

  reqId = requestAnimationFrame(updateGame);
}

// 円と四角形の当たり判定関数
function circleRectCollide(circle, rect) {
  let testX = circle.x;
  let testY = circle.y;
  if (circle.x < rect.x) testX = rect.x;
  else if (circle.x > rect.x + rect.w) testX = rect.x + rect.w;
  if (circle.y < rect.y) testY = rect.y;
  else if (circle.y > rect.y + rect.h) testY = rect.y + rect.h;
  let distX = circle.x - testX;
  let distY = circle.y - testY;
  return Math.sqrt((distX*distX) + (distY*distY)) <= circle.r - 2;
}

function drawGame() {
  // 背景
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 地面
  ctx.fillStyle = "#16213E";
  ctx.fillRect(0, canvas.height - 25, canvas.width, 25);
  ctx.strokeStyle = "#F7931A";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, canvas.height - 25); ctx.lineTo(canvas.width, canvas.height - 25); ctx.stroke();

  // プレイヤー (ビットコイン君)
  ctx.save();
  ctx.translate(player.x, player.y);
  // ジャンプ中は回転を止め、走っている時は少し回転させる
  if(player.vy === 0) ctx.rotate(Math.sin(frame * 0.3) * 0.2); 
  
  ctx.beginPath(); ctx.arc(0, 0, player.r, 0, Math.PI*2);
  ctx.fillStyle = "#F7931A"; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = "#fff"; ctx.stroke();
  
  ctx.fillStyle = "#fff"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("₿", 0, 0);

  // 目
  ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(6, -6, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(7, -6, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // 障害物 (Fiat / 紙幣)
  for (let obs of obstacles) {
    ctx.fillStyle = "#E94560";
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    // 模様
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(obs.x + 5, obs.y + 5, obs.w - 10, obs.h - 10);
    ctx.fillStyle = "#fff"; ctx.font = "14px Arial"; ctx.textAlign="center";
    ctx.fillText("$", obs.x + obs.w/2, obs.y + obs.h/2 + 5);
  }

  // アイテム (Sats / 雷)
  for (let item of items) {
    ctx.beginPath(); ctx.arc(item.x, item.y, item.r, 0, Math.PI*2);
    ctx.fillStyle = "#F7A800"; ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "12px Arial"; ctx.textAlign="center";
    ctx.fillText("⚡", item.x, item.y + 4);
  }
}

function gameOver() {
  isGameOver = true;
  canvas.style.display = 'none';
  scoreUI.style.display = 'none';
  document.getElementById('final-score').innerText = Math.floor(score);
  document.getElementById('panel-result').style.display = 'block';
}

// 初期化
changeLang('ja');
</script>

</body>
</html>
