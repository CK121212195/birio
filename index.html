const GAS_URL = "https://script.google.com/macros/s/AKfycbzMnKAqkIJCYjumI_Z3eosxTYwwHA8jo0u_Au6YV-aFXhvrxkjJ48l0JrVNg-5qG4xz/exec"; 
const LNBITS_API_URL = "https://demo.lnbits.com/api/v1/payments";
const LNBITS_INVOICE_KEY = "67e5b0ad270f44d19e6d768bb3314e49"; 

const i18n = {
  en: {

  ko: {

    btn_leaderboard: "🏆 점수 기록 (100 SATS)", btn_view_lb: "📋 랭킹 보기",

    payment_success: "결제 완료!", enter_name: "이름을 입력하세요:", btn_submit: "등록하기", alert_copy: "복사되었습니다!",
  }
};

let currentLang = "ja";
function changeLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = i18n[lang][el.getAttribute('data-i18n')]; });
}

// ----------------------------------------------------
// リーダーボード＆決済ロジック
// ----------------------------------------------------
let checkPaymentInterval = null;
let currentHash = "";

function openLeaderboardPay() {
  document.getElementById('result-buttons').style.display = 'none';
  document.getElementById('lb-invoice-area').style.display = 'block';

  fetch(LNBITS_API_URL, {
    method: "POST", headers: { "X-Api-Key": LNBITS_INVOICE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ out: false, amount: 100, memo: `BITCOIN RUN Score: ${Math.floor(score)} 🏃‍♂️` })
  })
  .then(res => res.json()).then(data => {
    currentHash = data.payment_hash;
    const inv = data.payment_request;
    document.getElementById('lb-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=lightning:${inv}`;
    document.getElementById('lb-inv-text').value = inv;
    document.getElementById('lb-wallet-link').href = `lightning:${inv}`;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if(isMobile) setTimeout(() => { window.location.href = `lightning:${inv}`; }, 500);
    pollPayment(currentHash);
  }).catch(e => alert("API Error"));
}

function pollPayment(hash) {
  if (checkPaymentInterval) clearInterval(checkPaymentInterval);
  checkPaymentInterval = setInterval(() => {
    fetch(`${LNBITS_API_URL}/${hash}`, { headers: { "X-Api-Key": LNBITS_INVOICE_KEY } })
    .then(res => res.json()).then(data => {
      if (data.paid) {
        clearInterval(checkPaymentInterval);
        document.getElementById('lb-invoice-area').style.display = 'none';
        document.getElementById('lb-name-area').style.display = 'block';
      }
    }).catch(console.error);
  }, 3000);
}

function copyLbInvoice() { document.getElementById('lb-inv-text').select(); document.execCommand('copy'); alert(i18n[currentLang].alert_copy); }
function cancelLbPay() { if(checkPaymentInterval) clearInterval(checkPaymentInterval); document.getElementById('lb-invoice-area').style.display = 'none'; document.getElementById('result-buttons').style.display = 'block'; }

function submitScore() {
  const name = document.getElementById('player-name').value.trim() || 'Anon';
  const timeStr = document.getElementById('final-time').innerText;
  const finalScore = Math.floor(score);
  const btn = document.querySelector('#lb-name-area button');
  btn.disabled = true; btn.innerText = "SAVING...";

  const cbName = 'gasCallback_' + Date.now();
  const script = document.createElement('script');
  
  window[cbName] = function(data) {
    document.getElementById('lb-name-area').style.display = 'none';
    document.getElementById('result-buttons').style.display = 'block';
    btn.disabled = false; btn.innerHTML = `<span data-i18n="btn_submit">${i18n[currentLang].btn_submit}</span>`;
    showLeaderboard();
    delete window[cbName]; document.body.removeChild(script);
  };
  script.onerror = function() {
    alert("Network Error.");
    btn.disabled = false; btn.innerHTML = `<span data-i18n="btn_submit">${i18n[currentLang].btn_submit}</span>`;
    delete window[cbName]; document.body.removeChild(script);
  };
  script.src = `${GAS_URL}?action=record&name=${encodeURIComponent(name)}&score=${finalScore}&timeStr=${encodeURIComponent(timeStr)}&callback=${cbName}`;
  document.body.appendChild(script);
}

function showLeaderboard() {
  document.getElementById('panel-result').style.display = 'none'; document.getElementById('panel-start').style.display = 'none'; document.getElementById('panel-leaderboard').style.display = 'block';
  document.getElementById('lb-list').innerHTML = "Loading...";

  const cbName = 'gasCallbackLB_' + Date.now();
  const script = document.createElement('script');
  
  window[cbName] = function(data) {
    let html = "";
    if (!data || data.length === 0) { html = "No records yet. Be the first!"; } 
    else {
      data.forEach((row, i) => {
        let rank = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}.`;
        html += `<div style="display:flex; justify-content:space-between; border-bottom:1px dashed #555; padding:8px 0;">
          <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:40%; color:#F7931A;">${rank} ${row.name}</span>
          <span style="color:#FFF;">${row.score} <span style="color:#aaa; font-size:8px;">[${row.timeStr}]</span></span>
        </div>`;
      });
    }
    document.getElementById('lb-list').innerHTML = html;
    delete window[cbName]; document.body.removeChild(script);
  };
  script.onerror = function() {
    document.getElementById('lb-list').innerHTML = "Network Error.";
    delete window[cbName]; document.body.removeChild(script);
  };
  script.src = `${GAS_URL}?action=get&callback=${cbName}`;
  document.body.appendChild(script);
}

function closeLeaderboard() {
  document.getElementById('panel-leaderboard').style.display = 'none';
  if (score > 0 && isGameOver) document.getElementById('panel-result').style.display = 'block';
  else document.getElementById('panel-start').style.display = 'block';
}

function shareTwitter() {
  const timeStr = document.getElementById('final-time').innerText;
  const finalScore = Math.floor(score);
  const text = `🏃‍♂️ BITCOIN RUN ⚡️\nScore: ${finalScore} / Time: ${timeStr}\n\nDodge FED, SCAM & CBDC! 🇺🇸\n避けろFIAT！掴めSats！ 🇯🇵\n은행과 스캠을 피하세요! 🇰🇷\n\nCan you beat my score? 👇\n#Bitcoin #ビットコイン #비트코인 #LightningNetwork`;
  const appUrl = window.location.href.split('?')[0]; 
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(appUrl)}`, '_blank');
}

// ----------------------------------------------------
// ゲームエンジン (Canvas 2D)
// ----------------------------------------------------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 🚨 キャンバスのサイズ拡張（ステータスバー用の黒帯を下部に追加）
canvas.width = 1000; 
canvas.height = 620; // 元の500 + 下部UI用120
const gameHeight = 500; // ゲーム画面領域の高さ
const groundY = 460;    // 地面の位置

let player, obstacles, items, bgElements, gameSpeed, score, frame, isGameOver, reqId;
let itemCount = 0; // 取得したアイテム(コイン)の数

const blockColors =["#a8e0b0", "#f8d8a0", "#a8d8f8"]; // 薄緑, ペールオレンジ, 水色

function startGame() {
  document.getElementById('panel-start').style.display = 'none';
  document.getElementById('panel-result').style.display = 'none';
  document.getElementById('panel-leaderboard').style.display = 'none';
  canvas.style.display = 'block';
  
  player = { x: 100, y: groundY - 20, r: 18, vy: 0, gravity: 0.55, jump: -9.5, jumpCount: 0, maxJumps: 5 };
  obstacles =[]; items =[];
  
  bgElements = { blocks:[], bushes:[] };
  
  for(let i=0; i<6; i++) {
    bgElements.blocks.push({
      x: i * 220 + Math.random()*100,
      w: 80 + Math.random()*120,
      h: 60 + Math.random()*120,
      c: blockColors[i % 3]
    });
  }
  for(let i=0; i<8; i++) {
    bgElements.bushes.push({
      x: i * 160 + Math.random()*80,
      r: 30 + Math.random()*40
    });
  }

  gameSpeed = 3.8; 
  score = 0; frame = 0; isGameOver = false;
  itemCount = 0;

  if(reqId) cancelAnimationFrame(reqId);
  updateGame();
}

function jump() {
  if (isGameOver) return;
  if (player.jumpCount < player.maxJumps) {
    player.vy = player.jump; player.jumpCount++;
  }
}

window.addEventListener('touchstart', (e) => {
  if (e.target.closest('.panel') || e.target.tagName === 'SELECT') return; 
  e.preventDefault(); jump();
}, {passive: false});
window.addEventListener('mousedown', (e) => {
  if (e.target.closest('.panel') || e.target.tagName === 'SELECT') return;
  jump();
});
window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });

function updateGame() {
  if (isGameOver) return;

  player.vy += player.gravity;
  player.y += player.vy;

  let isOverPit = false;
  for (let obs of obstacles) {
    if (obs.type === 'fiat_pit' && player.x > obs.x + 10 && player.x < obs.x + obs.w - 10) { isOverPit = true; }
  }

  if (!isOverPit && player.y + player.r >= groundY) {
    player.y = groundY - player.r; player.vy = 0; player.jumpCount = 0; 
  }
  
  // 🚨 画面外落下判定 (ゲーム画面の底である gameHeight を基準にする)
  if (player.y - player.r > gameHeight) { gameOver(); return; }

  frame++;
  let spawnRate = Math.max(60, 150 - Math.floor(gameSpeed * 10)); 
  
  if (frame % spawnRate === 0) {
    if (Math.random() < 0.15) {
      let w = 150 + Math.random() * 80;
      obstacles.push({ type: 'fiat_pit', x: canvas.width, y: groundY, w: w, h: 50 });
    } else {
      const types =['banker', 'shitcoin', 'cbdc_ufo', 'trump', 'ethereum', 'jpy_yen', 'ripple', 'cex'];
      const type = types[Math.floor(Math.random() * types.length)];
      
      if (type === 'cbdc_ufo') {
        let w = 60, h = 20; let flyY = groundY - 150 - Math.random() * 120; 
        obstacles.push({ type: type, x: canvas.width, y: flyY, w: w, h: h, base_y: flyY });
      } else if (type === 'banker') {
        let w = 50, h = 70; obstacles.push({ type: type, x: canvas.width, y: groundY - h, w: w, h: h });
      } else if (type === 'shitcoin') {
        let w = 40, h = 40; obstacles.push({ type: type, x: canvas.width, y: groundY - h - 10, w: w, h: h }); 
      } else if (type === 'trump') {
        let w = 50, h = 60; obstacles.push({ type: type, x: canvas.width, y: groundY - h, w: w, h: h, lastThrow: frame });
      } else if (type === 'ethereum') {
        let w = 30, h = 45; let flyY = groundY - 60 - Math.random() * 200;
        obstacles.push({ type: type, x: canvas.width, y: flyY, w: w, h: h });
      } else if (type === 'jpy_yen') {
        let w = 80, h = 40; 
        obstacles.push({ type: type, x: canvas.width, y: 40 + Math.random() * 60, w: w, h: h, isFalling: false, vy: 0 });
      } else if (type === 'ripple') {
        let w = 36, h = 36;
        obstacles.push({ type: type, x: canvas.width, y: groundY - h, w: w, h: h });
      } else if (type === 'cex') {
        let w = 70, h = 90;
        obstacles.push({ type: type, x: canvas.width, y: groundY - h, w: w, h: h, lastThrow: frame });
      }
    }
  }

  // 110フレームごとにアイテム (はてなブロック風) を配置
  if (frame % 110 === 0) items.push({ x: canvas.width, y: groundY - 100 - Math.random() * 180, r: 16 });

  bgElements.blocks.forEach(b => { 
    b.x -= gameSpeed * 0.15; 
    if(b.x + b.w < -50) { b.x = canvas.width + Math.random()*100; b.c = blockColors[Math.floor(Math.random()*3)]; } 
  });
  bgElements.bushes.forEach(b => { 
    b.x -= gameSpeed * 0.4; 
    if(b.x + b.r < -50) { b.x = canvas.width + Math.random()*100; } 
  });

  let currentLen = obstacles.length;
  for (let i = 0; i < currentLen; i++) {
    let obs = obstacles[i];
    
    // Trumpの攻撃
    if (obs.type === 'trump') {
      if (!obs.lastThrow) obs.lastThrow = frame;
      if (frame - obs.lastThrow > 80) { 
        obs.lastThrow = frame;
        obstacles.push({ type: 'usd_bill', x: obs.x + 10, y: obs.y - 15, w: 24, h: 12, vx: - (gameSpeed + 3.5), vy: -6, gravity: 0.25 });
      }
    }
    
    // CEXの炎攻撃
    if (obs.type === 'cex') {
      if (!obs.lastThrow) obs.lastThrow = frame;
      if (frame - obs.lastThrow > 90) {
        obs.lastThrow = frame;
        obstacles.push({ type: 'fire', x: obs.x - 10, y: obs.y + 20, w: 22, h: 22, vx: - (gameSpeed + 4), base_y: obs.y + 20, spawnFrame: frame });
      }
    }

    if (obs.type === 'usd_bill') {
      obs.x += obs.vx; obs.vy += obs.gravity; obs.y += obs.vy;
    } else if (obs.type === 'fire') {
      obs.x += obs.vx;
      obs.y = obs.base_y + Math.sin((frame - obs.spawnFrame) * 0.15) * 25;
    } else if (obs.type === 'ethereum') {
      obs.x -= (gameSpeed + 5.0); 
    } else if (obs.type === 'jpy_yen') {
      obs.x -= gameSpeed;
      if (!obs.isFalling && obs.x - player.x < 180 && obs.x - player.x > -50) { obs.isFalling = true; obs.vy = 18; }
      if (obs.isFalling) {
        obs.y += obs.vy;
        if (obs.y > groundY - obs.h) { obs.y = groundY - obs.h; obs.vy = 0; }
      }
    } else if (obs.type === 'ripple') {
      obs.x -= (gameSpeed * 0.75); 
      obs.y = groundY - obs.h - Math.abs(Math.sin(frame * 0.1) * 10); 
    } else {
      obs.x -= gameSpeed;
    }

    if (obs.type === 'cbdc_ufo') { obs.y = obs.base_y + Math.sin(frame * 0.1 + obs.x * 0.05) * 20; }
    
    // 当たり判定
    if (obs.type !== 'fiat_pit') {
      let hitbox;
      if (obs.type === 'usd_bill' || obs.type === 'fire') {
        hitbox = { x: obs.x, y: obs.y, w: obs.w, h: obs.h };
      } else if (obs.type === 'trump') {
        hitbox = { x: obs.x + 5, y: obs.y - 25, w: obs.w - 10, h: obs.h + 20 }; 
      } else if (obs.type === 'ethereum' || obs.type === 'ripple') {
        hitbox = { x: obs.x + 5, y: obs.y + 5, w: obs.w - 10, h: obs.h - 10 };
      } else if (obs.type === 'jpy_yen') {
        hitbox = { x: obs.x + 5, y: obs.y + 5, w: obs.w - 10, h: obs.h - 5 };
      } else if (obs.type === 'cex') {
        hitbox = { x: obs.x + 10, y: obs.y + 10, w: obs.w - 20, h: obs.h - 10 };
      } else {
        hitbox = { x: obs.x + 10, y: obs.y + 10, w: obs.w - 20, h: obs.h - 15 };
      }
      if (circleRectCollide(player, hitbox)) { gameOver(); return; }
    }
  }

  // アイテム判定（はてなブロック）
  for (let i = 0; i < items.length; i++) {
    let item = items[i]; item.x -= gameSpeed;
    let dx = player.x - item.x; let dy = player.y - item.y;
    if (Math.abs(dx) < player.r + item.r && Math.abs(dy) < player.r + item.r) { 
      score += 50; itemCount++; items.splice(i, 1); i--; 
    }
  }

  obstacles = obstacles.filter(o => o.x + o.w > -50);
  items = items.filter(i => i.x + i.r > -50);
  score += 0.1; gameSpeed = 3.8 + (frame / 2000); 
  
  drawGame();
  reqId = requestAnimationFrame(updateGame);
}

function circleRectCollide(circle, rect) {
  let testX = circle.x; let testY = circle.y;
  if (circle.x < rect.x) testX = rect.x; else if (circle.x > rect.x + rect.w) testX = rect.x + rect.w;
  if (circle.y < rect.y) testY = rect.y; else if (circle.y > rect.y + rect.h) testY = rect.y + rect.h;
  let distX = circle.x - testX; let distY = circle.y - testY;
  return Math.sqrt((distX*distX) + (distY*distY)) <= circle.r - 5; 
}

function drawGame() {
  // 1. 空の描画
  let gSky = ctx.createLinearGradient(0, 0, 0, gameHeight);
  gSky.addColorStop(0, "#74b4ff");
  gSky.addColorStop(1, "#cce8f4");
  ctx.fillStyle = gSky; ctx.fillRect(0, 0, canvas.width, gameHeight);

  // 2. 波打つ雲
  let cloudOffset = -(frame * 0.1) % 64;
  ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
  for(let i = cloudOffset - 64; i < canvas.width; i += 64) {
    ctx.beginPath();
    ctx.arc(i + 32, 50, 45, 0, Math.PI, false);
    ctx.fill();
  }

  // 3. 遠景のブロック
  for(let b of bgElements.blocks) {
    ctx.fillStyle = b.c;
    ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
    ctx.lineWidth = 2; ctx.strokeStyle = "#000";
    ctx.strokeRect(b.x, groundY - b.h, b.w, b.h);
    ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
    ctx.fillRect(b.x + 2, groundY - b.h + 2, b.w - 4, 4);
    ctx.fillRect(b.x + 2, groundY - b.h + 2, 4, b.h - 4);
    ctx.fillStyle = "#000";
    ctx.fillRect(b.x + 6, groundY - b.h + 6, 2, 2);
    ctx.fillRect(b.x + b.w - 8, groundY - b.h + 6, 2, 2);
    ctx.fillRect(b.x + 6, groundY - 8, 2, 2);
    ctx.fillRect(b.x + b.w - 8, groundY - 8, 2, 2);
  }

  // 4. 手前の茂み
  for(let b of bgElements.bushes) {
    ctx.save();
    ctx.translate(b.x, groundY);
    ctx.beginPath(); ctx.arc(0, 0, b.r, Math.PI, 0); ctx.closePath();
    ctx.fillStyle = "#48c848"; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = "#000"; ctx.stroke();
    ctx.clip(); 
    ctx.strokeStyle = "#289028"; ctx.lineWidth = 4;
    for(let i = -b.r; i < b.r; i += 12) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + b.r, -b.r); ctx.stroke();
    }
    ctx.restore();
  }

  // 5. 地面の描画
  ctx.fillStyle = "#c87830";
  ctx.fillRect(0, groundY, canvas.width, gameHeight - groundY);
  ctx.lineWidth = 2; ctx.strokeStyle = "#a05018";
  let groundOffset = -(frame * gameSpeed) % 20;
  for(let i = groundOffset - 20; i < canvas.width; i += 20) {
      ctx.beginPath(); ctx.moveTo(i, groundY); ctx.lineTo(i + (gameHeight - groundY), gameHeight); ctx.stroke();
  }
  ctx.fillStyle = "#fcb878"; ctx.fillRect(0, groundY, canvas.width, 12);
  ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
  ctx.strokeRect(0, groundY, canvas.width, 12);
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

  // 6. FIATの穴
  for (let obs of obstacles) {
    if (obs.type === 'fiat_pit') {
      ctx.fillStyle = "#000"; 
      ctx.fillRect(obs.x, groundY, obs.w, gameHeight - groundY);
      ctx.fillStyle = "#fcb878";
      ctx.fillRect(obs.x, groundY, 4, gameHeight - groundY);
      ctx.fillRect(obs.x + obs.w - 4, groundY, 4, gameHeight - groundY);
      ctx.lineWidth = 2; ctx.strokeStyle = "#000";
      ctx.strokeRect(obs.x, groundY, 4, gameHeight - groundY);
      ctx.strokeRect(obs.x + obs.w - 4, groundY, 4, gameHeight - groundY);
      
      ctx.fillStyle = "rgba(255,50,50,0.8)"; ctx.font = "bold 16px 'Press Start 2P', monospace"; 
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("FIAT", obs.x + obs.w/2, groundY + (gameHeight - groundY)/2);
    }
  }
  
  // 7. プレイヤー描画
  ctx.save(); ctx.translate(player.x, player.y);
  if(player.vy === 0) ctx.rotate(Math.sin(frame * 0.4) * 0.3); 
  let gradB = ctx.createRadialGradient(0, 0, player.r * 0.2, 0, 0, player.r);
  gradB.addColorStop(0, "#FFD700"); gradB.addColorStop(1, "#B8860B");
  ctx.beginPath(); ctx.arc(0, 0, player.r, 0, Math.PI*2); ctx.fillStyle = gradB; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = "#000"; ctx.stroke(); 
  ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("₿", 0, 0);
  ctx.restore();

  // 8. 敵キャラ描画
  for (let obs of obstacles) {
    if (obs.type === 'fiat_pit') continue;
    let cx = obs.x + obs.w/2; let cy = obs.y + obs.h/2;

    if (obs.type === 'banker') {
      let gBank = ctx.createLinearGradient(obs.x, obs.y, obs.x + obs.w, obs.y);
      gBank.addColorStop(0, "#2c3e50"); gBank.addColorStop(1, "#1a252f");
      ctx.fillStyle = gBank; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = "#bdc3c7"; ctx.fillRect(obs.x + 5, obs.y + 15, 8, obs.h - 15); ctx.fillRect(obs.x + obs.w - 13, obs.y + 15, 8, obs.h - 15);
      ctx.beginPath(); ctx.moveTo(obs.x - 5, obs.y + 15); ctx.lineTo(obs.x + obs.w/2, obs.y - 10); ctx.lineTo(obs.x + obs.w + 5, obs.y + 15); ctx.fill();
      ctx.fillStyle = "#FFF"; ctx.font = "bold 10px Arial"; ctx.fillText("FED", cx, cy + 5);
    } 
    else if (obs.type === 'shitcoin') {
      let gScam = ctx.createRadialGradient(cx, cy, 5, cx, cy, obs.w/2);
      gScam.addColorStop(0, "#9b59b6"); gScam.addColorStop(1, "#8e44ad");
      ctx.beginPath(); ctx.arc(cx, cy, obs.w/2, 0, Math.PI*2); ctx.fillStyle = gScam; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = "#000"; ctx.stroke();
      ctx.fillStyle = "#FFF"; ctx.font = "bold 12px Arial"; ctx.fillText("💩", cx, cy - 2);
      ctx.font = "bold 9px Arial"; ctx.fillText("SCAM", cx, cy + 10);
    }
    else if (obs.type === 'cbdc_ufo') {
      ctx.fillStyle = "rgba(46, 204, 113, 0.4)"; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - 30, groundY); ctx.lineTo(cx + 30, groundY); ctx.fill();
      ctx.fillStyle = "#bdc3c7"; ctx.beginPath(); ctx.ellipse(cx, cy, obs.w/2, obs.h/2, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = "rgba(41, 128, 185, 0.8)"; ctx.beginPath(); ctx.ellipse(cx, cy - 5, obs.w/4, obs.h/3, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#000"; ctx.font = "bold 10px Arial"; ctx.fillText("CBDC", cx, cy + 15);
    }
    else if (obs.type === 'trump') {
      ctx.fillStyle = "#3498db"; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.moveTo(cx - 5, obs.y); ctx.lineTo(cx + 5, obs.y); ctx.lineTo(cx, obs.y + 35); ctx.fill();
      ctx.fillStyle = "#f39c12"; ctx.beginPath(); ctx.arc(cx, obs.y - 15, 18, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(cx, obs.y - 25, 20, Math.PI, 0); ctx.fill(); ctx.stroke();
      ctx.fillRect(cx - 20, obs.y - 28, 40, 10); ctx.strokeRect(cx - 20, obs.y - 28, 40, 10);
      ctx.fillStyle = "#FFF"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center"; ctx.textBaseline="alphabetic"; ctx.fillText("TRUMP", cx, obs.y + obs.h - 5);
    }
    else if (obs.type === 'usd_bill') {
      ctx.save(); ctx.translate(obs.x + obs.w/2, obs.y + obs.h/2); ctx.rotate(-frame * 0.15); 
      ctx.fillStyle = "#2ecc71"; ctx.fillRect(-obs.w/2, -obs.h/2, obs.w, obs.h);
      ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(-obs.w/2, -obs.h/2, obs.w, obs.h);
      ctx.fillStyle = "#FFF"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("$", 0, 0);
      ctx.restore();
    }
    else if (obs.type === 'ethereum') {
      ctx.fillStyle = "#627eea"; ctx.beginPath();
      ctx.moveTo(cx, obs.y); ctx.lineTo(obs.x + obs.w, cy); ctx.lineTo(cx, obs.y + obs.h); ctx.lineTo(obs.x, cy); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = "#FFF"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center"; ctx.textBaseline="middle"; ctx.fillText("ETH", cx, cy + 3);
    }
    else if (obs.type === 'jpy_yen') {
      ctx.fillStyle = "#dcd7b4"; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = "#000";
      ctx.beginPath(); ctx.moveTo(obs.x+15, obs.y+10); ctx.lineTo(obs.x+35, obs.y+18); ctx.lineTo(obs.x+20, obs.y+22); ctx.fill();
      ctx.beginPath(); ctx.moveTo(obs.x+obs.w-15, obs.y+10); ctx.lineTo(obs.x+obs.w-35, obs.y+18); ctx.lineTo(obs.x+obs.w-20, obs.y+22); ctx.fill(); 
      ctx.font = "bold 12px Arial"; ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.fillText("¥10000", cx, obs.y + obs.h - 2);
    }
    else if (obs.type === 'ripple') {
      ctx.fillStyle = "#FFFFFF"; ctx.beginPath(); ctx.arc(cx, cy, obs.w/2, 0, Math.PI*2); ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = "#000"; ctx.stroke();
      ctx.strokeStyle = "#008ece"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round";
      ctx.beginPath(); ctx.moveTo(cx - 7, cy - 5); ctx.lineTo(cx - 2, cy); ctx.lineTo(cx - 7, cy + 5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + 7, cy - 5); ctx.lineTo(cx + 2, cy); ctx.lineTo(cx + 7, cy + 5); ctx.stroke();
      ctx.fillStyle = "#000"; ctx.font = "bold 9px Arial"; ctx.textAlign = "center"; ctx.textBaseline="bottom"; 
      ctx.fillText("XRP", cx, cy - obs.w/2 - 2);
    }
    else if (obs.type === 'cex') {
      ctx.fillStyle = "#1e1e1e"; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = "#333"; ctx.fillRect(obs.x + 5, obs.y + 5, obs.w - 10, 20); 
      ctx.fillStyle = "#ff3333"; ctx.font = "bold 14px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("CEX", cx, obs.y + 15);
      ctx.fillStyle = "rgba(255, 50, 50, 0.9)";
      for(let wx = 10; wx < obs.w - 10; wx += 20) {
        for(let wy = 35; wy < obs.h - 10; wy += 20) {
          ctx.fillRect(obs.x + wx, obs.y + wy, 10, 10);
        }
      }
    }
    else if (obs.type === 'fire') {
      ctx.save(); ctx.translate(cx, cy);
      let gFire = ctx.createRadialGradient(0, 0, 0, 0, 0, obs.w/2);
      gFire.addColorStop(0, "rgba(255,255,255,1)"); gFire.addColorStop(0.3, "rgba(255,255,0,1)"); gFire.addColorStop(0.8, "rgba(255,69,0,1)"); gFire.addColorStop(1, "rgba(255,0,0,0)");
      ctx.fillStyle = gFire; ctx.beginPath(); ctx.arc(0, 0, obs.w, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,69,0,0.9)"; ctx.beginPath(); ctx.moveTo(0, -obs.h/3); ctx.lineTo(obs.w, 0); ctx.lineTo(0, obs.h/3); ctx.fill();
      ctx.restore();
    }
  }

  // 9. アイテム (はてなブロック風)
  for (let item of items) {
    ctx.save(); ctx.translate(item.x, item.y);
    ctx.fillStyle = "#f8b800"; 
    ctx.fillRect(-item.r, -item.r, item.r*2, item.r*2);
    ctx.lineWidth = 2; ctx.strokeStyle = "#000";
    ctx.strokeRect(-item.r, -item.r, item.r*2, item.r*2);
    ctx.fillStyle = "#000";
    ctx.fillRect(-item.r+2, -item.r+2, 2, 2); ctx.fillRect(item.r-4, -item.r+2, 2, 2);
    ctx.fillRect(-item.r+2, item.r-4, 2, 2); ctx.fillRect(item.r-4, item.r-4, 2, 2);
    ctx.beginPath(); ctx.moveTo(2, -6); ctx.lineTo(8, -6); ctx.lineTo(4, 0); ctx.lineTo(8, 0); ctx.lineTo(0, 8); ctx.lineTo(2, 2); ctx.lineTo(-2, 2); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // 🚨 10. スーパーマリオ3風の専用下部ステータスバー
  const sbY = gameHeight; // 500
  const sbH = 120;
  
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  
  // 黒背景
  ctx.fillStyle = "#000";
  ctx.fillRect(0, sbY, canvas.width, sbH);
  
  // 白枠 (左側全体)
  ctx.strokeStyle = "#FFF";
  ctx.lineWidth = 4;
  ctx.strokeRect(20, sbY + 15, canvas.width - 240, sbH - 30);
  
  // 水色内枠 (左側全体)
  ctx.strokeStyle = "#5cb8ff";
  ctx.lineWidth = 2;
  ctx.strokeRect(24, sbY + 19, canvas.width - 248, sbH - 38);

  // 右側のアイテムボックス 3つ
  let boxW = 50;
  let boxH = sbH - 30;
  let startX = canvas.width - 200;
  let boxY = sbY + 15;

  for(let i=0; i<3; i++) {
    let bx = startX + i * 60;
    ctx.strokeStyle = "#FFF";
    ctx.lineWidth = 4;
    ctx.strokeRect(bx, boxY, boxW, boxH);
    ctx.strokeStyle = "#5cb8ff";
    ctx.lineWidth = 2;
    ctx.strokeRect(bx + 4, boxY + 4, boxW - 8, boxH - 8);
  }

  // テキスト情報の描画
  ctx.fillStyle = "#FFF";
  ctx.font = "16px 'Press Start 2P', monospace";
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  
  // 左上
  ctx.fillText("WORLD 1", 40, sbY + 35);
  // 左下
  ctx.fillStyle = "#FFD700";
  ctx.fillText("₿", 40, sbY + 70);
  ctx.fillStyle = "#FFF";
  ctx.fillText("x 21", 70, sbY + 70);

  // 中央上 (Pメーター風のスピードゲージ)
  let speedLevel = Math.min(6, Math.floor(frame / 600)); // 時間経過でゲージが伸びる
  let px = 240;
  let py = sbY + 35;
  for(let i=0; i<6; i++) {
    ctx.fillStyle = (i < speedLevel) ? "#FFF" : "transparent";
    ctx.strokeStyle = "#FFF";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px + i*16, py);
    ctx.lineTo(px + i*16 + 10, py + 7);
    ctx.lineTo(px + i*16, py + 14);
    ctx.closePath();
    if (i < speedLevel) ctx.fill();
    else ctx.stroke();
  }
  ctx.fillStyle = speedLevel === 6 ? "#FFD700" : "#FFF";
  ctx.fillText("(P)", px + 6*16 + 5, py);
  
  // 中央下 (SCORE)
  ctx.fillStyle = "#FFF";
  let scoreStr = Math.floor(score).toString().padStart(7, '0');
  ctx.fillText(scoreStr, 240, sbY + 70);

  // 右上 (COIN / 雷ブロック取得数)
  ctx.fillStyle = "#FFD700";
  ctx.fillText("$", 500, sbY + 35);
  ctx.fillStyle = "#FFF";
  ctx.fillText(itemCount.toString().padStart(2, '0'), 530, sbY + 35);

  // 右下 (TIME)
  let totalSeconds = Math.floor(frame / 60);
  let m = String(Math.floor(totalSeconds / 60)).padStart(2, '0'); let s = String(totalSeconds % 60).padStart(2, '0');
  ctx.fillText(`TIME ${m}:${s}`, 500, sbY + 70);
}

function gameOver() {
  isGameOver = true; canvas.style.display = 'none';
  let m = String(Math.floor(Math.floor(frame / 60) / 60)).padStart(2, '0'); let s = String(Math.floor(frame / 60) % 60).padStart(2, '0');
  document.getElementById('final-time').innerText = `${m}:${s}`;
  document.getElementById('final-score').innerText = Math.floor(score);
  document.getElementById('panel-result').style.display = 'block';
}

changeLang('ja');
</script>
